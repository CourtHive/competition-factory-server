packages: []

# Disable pnpm v11's supply-chain minimumReleaseAge policy. Recent
# CourtHive-owned packages (factory, provider-config, i18n) often fall
# within the policy's freshness window but are overridden to local
# `link:../` paths below — the lockfile entries are advisory, not
# fetched. The policy false-positives on those and blocks install.
minimumReleaseAge: 0

allowBuilds:
  '@dep-tree/cli': true
  '@nestjs/core': true
  '@scarf/scarf': true
  '@swc/core': true
  classic-level: true
  core-js: true
  rollup: true
  unrs-resolver: true

# esbuild's legacy postinstall (downloading the platform binary) is
# obsolete since esbuild 0.16 ships platform binaries via optional
# subpackages (@esbuild/linux-x64 etc.). mentat-build-all.sh installs
# subdir packages with --ignore-scripts, which contradicts an allowBuilds
# entry and triggers ERR_PNPM_IGNORED_BUILDS noise plus a misleading
# `pnpm approve-builds` prompt. Listing esbuild here tells pnpm "this is
# intentionally skipped" — no error, no prompt. Safe in production
# because the platform binary still resolves via the optional subpackage.
ignoredBuiltDependencies:
  - esbuild
