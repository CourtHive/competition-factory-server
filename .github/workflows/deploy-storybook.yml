name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'src/stories/**'
      - '.storybook/**'
      - '.github/workflows/deploy-storybook.yml'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # pnpm-workspace.yaml `link:` overrides point at sibling clones
      # (factory, provider-config, courthive-i18n, courthive-ingest) that
      # don't exist on the runner. Today Storybook builds anyway because
      # stories don't import those packages, but the dangling symlinks
      # are a latent bomb — strip the link: lines so package.json pins
      # are used.
      - name: 'Strip link: overrides for CI'
        run: |
          node -e "
          const fs = require('fs');
          if (fs.existsSync('pnpm-workspace.yaml')) {
            const before = fs.readFileSync('pnpm-workspace.yaml', 'utf8');
            const after = before.split('\n').filter(line => !/:\s*link:\S+\s*\$/.test(line)).join('\n');
            if (after !== before) fs.writeFileSync('pnpm-workspace.yaml', after);
          }
          "
          rm -f pnpm-lock.yaml

      - run: pnpm install

      - run: pnpm build-storybook
        env:
          NODE_ENV: production

      - uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
